<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Practice тАФ UkusAP</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
<style>
:root {
  --gold: #F0A012;
  --teal: #00A187;
  --border: rgba(15,23,42,0.1);
  --muted: #6B7280;
  --green: #15803D;
  --green-bg: #F0FDF4;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: #fff;
  color: #15171F;
  font-family: 'Inter', system-ui, sans-serif;
  line-height: 1.6;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#fff; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.15); border-radius:3px; }

/* тФАтФАтФА TOP BAR тФАтФАтФА */
.exam-top {
  background: #fff;
  color: #15171F;
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.6rem;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  flex-shrink: 0;
  gap: 1rem;
}
.exam-top-left {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.92rem;
  font-weight: 600;
}
.exam-top-left .logo-int { color: var(--gold); }
.exam-top-sub { color: var(--muted); font-size: 0.82rem; font-weight: 400; }
.exam-top-center { display: flex; justify-content: center; align-items: center; }
.exam-top-right { display: flex; justify-content: flex-end; align-items: center; gap: 0.6rem; }
.logout-icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.logout-icon-btn:hover { background: #F4F5F7; color: #15171F; border-color: rgba(15,23,42,0.2); }

.calc-toggle-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.calc-toggle-btn:hover, .calc-toggle-btn.active { background: #F4F5F7; color: #15171F; border-color: rgba(15,23,42,0.2); }

.calc-panel {
  display: none;
  flex-direction: column;
  position: fixed;
  top: 80px; left: calc(100vw - 404px);
  width: 380px; height: 540px;
  min-width: 300px; min-height: 360px;
  max-width: 92vw; max-height: 88vh;
  background: #fff;
  border: 1px solid rgba(15,23,42,0.14);
  border-radius: 12px;
  box-shadow: 0 20px 48px rgba(15,23,42,0.24);
  overflow: hidden;
  resize: both;
  z-index: 500;
}
.calc-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.55rem 0.5rem 0.55rem 0.9rem;
  background: #F4F5F7;
  border-bottom: 1px solid rgba(15,23,42,0.1);
  cursor: move;
  user-select: none;
  touch-action: none;
  flex-shrink: 0;
}
.calc-panel-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: #15171F;
}
.calc-panel-close {
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #6B7280;
  cursor: pointer;
  transition: all 0.15s;
}
.calc-panel-close:hover { background: rgba(15,23,42,0.08); color: #15171F; }
.calc-panel-frame { flex: 1; width: 100%; border: none; }
@media (max-width: 480px) {
  .calc-panel { left: 4vw; top: 8vh; }
}

/* тФАтФАтФА SET PROGRESS (functional тАФ how far through the set) тФАтФАтФА */
.set-progress {
  height: 4px;
  flex-shrink: 0;
  background: rgba(15,23,42,0.08);
}
.set-progress-fill {
  height: 100%;
  background: var(--teal);
  width: 0%;
  transition: width 0.3s ease;
}

/* тФАтФАтФА SHORTFALL NOTICE тФАтФАтФА */
.shortfall-notice {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  background: #FFFBEB;
  border-bottom: 1px solid #FDE68A;
  color: #92400E;
  font-size: 0.85rem;
  padding: 0.7rem 1.6rem;
  flex-shrink: 0;
}
.shortfall-notice.visible { display: flex; }
.shortfall-dismiss {
  background: none;
  border: none;
  color: #92400E;
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0.7;
}
.shortfall-dismiss:hover { opacity: 1; }

/* тФАтФАтФА MAIN тФАтФАтФА */
.exam-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.exam-pane {
  flex: 1;
  overflow-y: auto;
  padding: 2.4rem 2.8rem;
}

.exam-pane-left {
  background: #FAFAF8;
  border-right: 1px solid var(--border);
}

.question-prompt {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.08rem;
  line-height: 1.85;
  color: #1A1A1A;
  max-width: 560px;
}

.question-prompt table.q-table {
  border-collapse: collapse;
  margin: 1.2rem 0;
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
}
.question-prompt table.q-table th,
.question-prompt table.q-table td {
  border: 1px solid #1A1A1A;
  padding: 0.4rem 0.8rem;
  text-align: center;
}
.question-prompt table.q-table th { background: #F0EDE6; font-weight: 700; }
.question-prompt table.q-table td.q-table-gap { border: none; padding: 0 0.5rem; background: transparent; }

.question-graph {
  margin-top: 1.4rem;
  max-width: 100%;
}
.question-graph svg { max-width: 100%; height: auto; display: block; }

/* тФАтФАтФА REPORT A PROBLEM тФАтФАтФА */
.report-line { margin-top: 1.4rem; }
.report-trigger {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: none; border: none; color: var(--muted);
  font-size: 0.8rem; font-family: 'Inter', sans-serif; cursor: pointer; padding: 0.3rem 0; transition: color 0.15s;
}
.report-trigger:hover { color: var(--red); }
.report-trigger svg { width: 14px; height: 14px; flex-shrink: 0; }
.report-panel {
  margin-top: 0.6rem; max-width: 480px;
  background: #FAFAFA; border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem;
}
.report-panel-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 0.7rem; }
.report-options { display: flex; flex-direction: column; gap: 0.55rem; margin-bottom: 0.8rem; }
.report-options label { display: flex; align-items: center; gap: 0.55rem; font-size: 0.82rem; cursor: pointer; }
.report-options input[type=radio] { accent-color: var(--red); cursor: pointer; }
.report-textarea {
  width: 100%; min-height: 70px; padding: 0.6rem 0.7rem; border-radius: 8px; border: 1px solid var(--border);
  font-family: inherit; font-size: 0.82rem; resize: vertical; margin-bottom: 0.8rem; display: none;
}
.report-textarea:focus { outline: none; border-color: var(--red); }
.report-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
.report-btn { font-size: 0.8rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 7px; cursor: pointer; border: none; font-family: 'Inter', sans-serif; }
.report-btn.cancel { background: none; color: var(--muted); }
.report-btn.cancel:hover { color: #15171F; }
.report-btn.send { background: var(--red); color: #fff; }
.report-btn.send:hover { background: #991B1B; }
.report-btn.send:disabled { opacity: 0.5; cursor: not-allowed; }
.report-confirm { font-size: 0.82rem; color: var(--green); font-weight: 600; }

.exam-pane-right { background: #fff; }

.question-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.6rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.question-num-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  background: #131417;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 0.82rem;
  font-weight: 700;
  border-radius: 5px;
}

.question-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
}

.choices-list {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  max-width: 540px;
}

.choice-row {
  display: flex;
  align-items: flex-start;
  gap: 0.9rem;
  padding: 0.85rem 1.1rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.choice-row:hover { border-color: rgba(15,23,42,0.25); background: #FAFAFA; }

.choice-badge {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid #9CA3AF;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  transition: all 0.15s;
}

.choice-text { padding-top: 0.1rem; font-size: 0.95rem; }

.choice-row.selected {
  border-color: var(--teal);
  background: rgba(0,161,135,0.05);
}
.choice-row.selected .choice-badge {
  border-color: var(--teal);
  background: var(--teal);
  color: #fff;
}

.choice-row.locked { cursor: default; }

.choice-row.correct {
  border-color: var(--green);
  background: var(--green-bg);
}
.choice-row.correct .choice-badge {
  border-color: var(--green);
  background: var(--green);
  color: #fff;
}
.choice-row.incorrect {
  border-color: var(--red);
  background: var(--red-bg);
}
.choice-row.incorrect .choice-badge {
  border-color: var(--red);
  background: var(--red);
  color: #fff;
}

/* тФАтФАтФА SOLUTION PANEL тФАтФАтФА */
.solution-panel {
  margin-top: 1.8rem;
  max-width: 540px;
  padding: 1.4rem 1.5rem;
  background: #FAFBFC;
  border: 1px solid var(--border);
  border-radius: 12px;
}
.solution-result {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 0.9rem;
}
.solution-result.is-correct { color: var(--green); }
.solution-result.is-incorrect { color: var(--red); }

.solution-title {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6rem;
}
.solution-text {
  font-size: 0.92rem;
  line-height: 1.85;
  color: #1A1A1A;
}
.solution-text p { margin-bottom: 0.9rem; }
.solution-text p:last-child { margin-bottom: 0; }

.scroll-hint {
  text-align: center;
  font-size: 0.78rem;
  color: var(--muted2, #9CA3AF);
  margin-top: 1.2rem;
  font-family: 'Space Mono', monospace;
}

/* тФАтФАтФА BOTTOM BAR тФАтФАтФА */
.exam-bottom {
  background: #fff;
  border-top: 1px solid var(--border);
  padding: 0.9rem 1.6rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}

.exam-user-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
}

/* тФАтФАтФА QUESTION NAV POPUP тФАтФАтФА */
.q-nav-popup {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(15,23,42,0.13);
  padding: 1rem;
  display: none;
  z-index: 100;
  min-width: 220px;
}
.q-nav-popup.open { display: block; }
.q-nav-popup-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0.4rem;
}
.q-grid-btn {
  width: 36px; height: 36px;
  border-radius: 7px;
  border: 1.5px solid #D1D5DB;
  background: #fff;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.15s;
}
.q-grid-btn:hover { border-color: #9CA3AF; }
.q-grid-btn.answered { background: rgba(0,161,135,0.1); border-color: var(--teal); color: var(--teal); }
.q-grid-btn.current { border-color: var(--gold); border-width: 2px; color: #D88A0A; }

.q-nav-btn {
  background: #131417;
  color: #fff;
  border: none;
  border-radius: 100px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 0.86rem;
  padding: 0.55rem 1.4rem;
  cursor: pointer;
  transition: background 0.18s;
  white-space: nowrap;
}
.q-nav-btn:hover { background: #2D2F36; }

.exam-action-btn {
  background: var(--gold);
  color: #fff;
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 0.65rem 1.6rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.18s;
}
.exam-action-btn:hover:not(:disabled) { background: #D88A0A; }
.exam-action-btn:disabled { background: #D1D5DB; cursor: not-allowed; }

/* тФАтФАтФА EMPTY / SUMMARY SCREEN тФАтФАтФА */
.center-screen {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.center-card {
  text-align: center;
  max-width: 460px;
}
.center-card .big-score {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 3.2rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 0.4rem;
}
.center-card h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.6rem;
}
.center-card p {
  color: var(--muted);
  font-size: 0.92rem;
  margin-bottom: 1.8rem;
}
.center-card-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: center;
}
.btn-primary, .btn-secondary {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 0.75rem 1.4rem;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s;
  border: none;
}
.btn-primary { background: var(--gold); color: #fff; }
.btn-primary:hover { background: #D88A0A; }
.btn-secondary { background: #fff; color: #15171F; border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: rgba(15,23,42,0.3); }

/* тФАтФАтФА RESPONSIVE тФАтФАтФА */
@media (max-width: 860px) {
  .exam-main { flex-direction: column; overflow-y: auto; }
  .exam-pane { overflow-y: visible; }
  .exam-pane-left { border-right: none; border-bottom: 1px solid var(--border); }
}
sup, sub { font-size: 0.72em; line-height: 0; position: relative; vertical-align: baseline; }
sup { top: -0.5em; }
sub { bottom: -0.2em; }
</style>
</head>
<body>

<header class="exam-top">
  <div class="exam-top-left">
    <span class="logo-int">тИл</span>
    <span id="examLabel">Advanced Practice</span>
    <span class="exam-top-sub" id="examSub"></span>
  </div>
  <div class="exam-top-center"></div>
  <div class="exam-top-right">
    <button class="calc-toggle-btn" id="calcToggleBtn" type="button" aria-label="Open calculator" title="Calculator">
      <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
        <rect x="5" y="2" width="14" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/>
        <rect x="7.5" y="4.5" width="9" height="4" rx="0.5" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="8.5" cy="13" r="1" fill="currentColor"/>
        <circle cx="12" cy="13" r="1" fill="currentColor"/>
        <circle cx="15.5" cy="13" r="1" fill="currentColor"/>
        <circle cx="8.5" cy="17" r="1" fill="currentColor"/>
        <circle cx="12" cy="17" r="1" fill="currentColor"/>
        <circle cx="15.5" cy="17" r="1" fill="currentColor"/>
      </svg>
    </button>
    <button class="logout-icon-btn" id="logoutBtn" type="button" aria-label="Log out" title="Log out">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <path d="M9 4H5a1 1 0 00-1 1v14a1 1 0 001 1h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M16 16l4-4-4-4M20 12H9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</header>

<div class="calc-panel" id="calcPanel">
  <div class="calc-panel-header" id="calcPanelHeader">
    <span class="calc-panel-title">Calculator</span>
    <button class="calc-panel-close" id="calcPanelClose" type="button" aria-label="Close calculator">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>
  <iframe class="calc-panel-frame" id="calcPanelFrame" title="Desmos Scientific Calculator"></iframe>
</div>

<div class="set-progress"><div class="set-progress-fill" id="setProgressFill"></div></div>

<div class="shortfall-notice" id="shortfallNotice">
  <span id="shortfallText"></span>
  <button class="shortfall-dismiss" id="shortfallDismiss" aria-label="Dismiss">&times;</button>
</div>

<main class="exam-main" id="examMain">
  <section class="exam-pane exam-pane-left">
    <div class="question-prompt" id="questionPrompt">Loading your custom setтАж</div>
    <div class="question-graph" id="stimulusGraph" style="display:none"></div>

    <div class="report-line">
      <button class="report-trigger" id="reportTrigger" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.3 3.9L2.7 17a2 2 0 001.7 3h15.2a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Report a problem with this question
      </button>
      <div class="report-panel" id="reportPanel" style="display:none"></div>
    </div>
  </section>

  <section class="exam-pane exam-pane-right">
    <div class="question-header-row">
      <span class="question-num-badge" id="qNumBadge">1</span>
      <span class="question-tag" id="questionTag"></span>
    </div>

    <div class="choices-list" id="choicesList"></div>

    <div class="solution-panel" id="solutionPanel" style="display:none">
      <div class="solution-result" id="solutionResult"></div>
      <div class="solution-title">Solution</div>
      <div class="solution-text" id="solutionText"></div>
      <div class="question-graph" id="questionGraph"></div>
      <div class="scroll-hint" id="scrollHint" style="display:none">тЖС scroll up to review the question again</div>
    </div>
  </section>
</main>

<div class="center-screen" id="centerScreen" style="display:none">
  <div class="center-card" id="centerCard"></div>
</div>

<footer class="exam-bottom" id="examBottom">
  <div id="qNavPopup" class="q-nav-popup"></div>
  <span class="exam-user-name" id="examUserName">Student</span>
  <button class="q-nav-btn" id="qNavBtn">Question 1 of 1 тЖС</button>
  <button class="exam-action-btn" id="actionBtn" disabled>Submit</button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js"></script>
<script src="config.js"></script>
<script>
const token = localStorage.getItem('derive_token');
if (!token) { window.location.href = 'LOGIN'; }

function openCalcPanel() {

let calcDrag = null;
calcPanelHeader.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.calc-panel-close')) return;
  const rect = calcPanel.getBoundingClientRect();
  calcDrag = { offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
  calcPanel.style.left = rect.left + 'px';
  calcPanel.style.top = rect.top + 'px';
  calcPanelFrame.style.pointerEvents = 'none';
  calcPanelHeader.setPointerCapture(e.pointerId);
});
calcPanelHeader.addEventListener('pointermove', (e) => {
  if (!calcDrag) return;
  const maxX = window.innerWidth - calcPanel.offsetWidth;
  const maxY = window.innerHeight - calcPanel.offsetHeight;
  const x = Math.max(0, Math.min(e.clientX - calcDrag.offsetX, maxX));
  const y = Math.max(0, Math.min(e.clientY - calcDrag.offsetY, maxY));
  calcPanel.style.left = x + 'px';
  calcPanel.style.top = y + 'px';
});
function endCalcDrag() { calcDrag = null; calcPanelFrame.style.pointerEvents = ''; }
calcPanelHeader.addEventListener('pointerup', endCalcDrag);

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

/* The bank writes limits as plain "lim(xтЖТ2)" instead of LaTeX. Convert that
   specific pattern into a properly stacked \lim_{x \to 2}. */
function convertLimNotation(text) {
  return text.replace(
    /lim\(([a-zA-Z]+)\s*(?:тЖТ|->)\s*([^()]+)\)/g,
    '\\(\\displaystyle\\lim_{$1 \\to $2}\\)'
  );
}

/* Some questions embed a plain-text table of values, e.g.
     x:     1.9    1.99   1.999  |  2.001  2.01   2.1
     f(x): 11.41  11.94  11.994 |  12.006  12.06  12.61
   Detect runs of 2+ consecutive "label: val val val | val val" lines and
   turn them into a real bordered <table> instead of squished plain text. */
/* Values must be numeric-ish (numbers, signs, DNE, тИЮ) so prose lines that
   contain a colon (e.g. "Claim 1: ...") are never mistaken for table rows. */
function looksLikeTableValues(rest) {
  const tokens = rest.split('|').join(' ').trim().split(/\s+/);
  if (tokens.length < 2) return false;
  return tokens.every(t =>
    /^(?:[+\-тИТтАУ]?(?:\d+(?:\.\d+)?|\.\d+|\d+\/\d+|тИЮ)|[+\-тИТтАУ0]|DNE|undef(?:ined)?)$/i.test(t)
  );
}

function convertTables(text) {
  const lines = text.split('\n');
  const rowPattern = /^\s*([^:\n]{1,40}?):\s+(\S.*)$/;
  const out = [];
  let i = 0;
  while (i < lines.length) {
    let j = i;
    const rows = [];
    while (j < lines.length) {
      const m = lines[j].match(rowPattern);
      if (!m || !looksLikeTableValues(m[2])) break;
      rows.push({ label: m[1], rest: m[2] });
      j++;
    }
    if (rows.length >= 2) {
      out.push(buildTableHtml(rows));
      i = j;
    } else {
      out.push(lines[i]);
      i++;
    }
  }
  return out.join('\n');
}

function buildTableHtml(rows) {
  let html = '<table class="q-table">';
  rows.forEach(row => {
    const groups = row.rest.split('|').map(g => g.trim().split(/\s+/).filter(Boolean));
    html += '<tr><th>' + row.label + '</th>';
    groups.forEach((group, gi) => {
      group.forEach(val => { html += '<td>' + val + '</td>'; });
      if (gi < groups.length - 1) html += '<td class="q-table-gap"></td>';
    });
    html += '</tr>';
  });
  html += '</table>';
  return html;
}

/* The question bank stores math wrapped in plain ( ... ) instead of \( ... \).
   Convert only the parenthesised groups that actually contain LaTeX (a
   backslash command, or ^ / _) into \( ... \) so KaTeX's auto-render can
   find them, while leaving ordinary English parentheses untouched. */
function prepMath(text) {
  let out = '';
  let i = 0;
  while (i < text.length) {
    if (text[i] === '[' && text[i - 1] === '\\') {
      // Already a proper \[ ... \] display delimiter - copy verbatim, don't re-wrap.
      let close = text.indexOf('\\]', i);
      if (close === -1) { out += text.slice(i); break; }
      close += 2;
      out += text.slice(i, close);
      i = close;
    } else if (text[i] === '(' && text[i - 1] === '\\') {
      // Already a proper \( ... \) delimiter (e.g. from convertLimNotation) - copy verbatim, don't re-wrap.
      let close = text.indexOf('\\)', i);
      if (close === -1) { out += text.slice(i); break; }
      close += 2;
      out += text.slice(i, close);
      i = close;
    } else if (text[i] === '(') {
      let depth = 1, j = i + 1;
      while (j < text.length && depth > 0) {
        if (text[j] === '(') depth++;
        else if (text[j] === ')') depth--;
        j++;
      }
      const inner = text.slice(i + 1, j - 1);
      if (/\\[a-zA-Z]+|[\^_]/.test(inner)) {
        out += '\\(' + inner + '\\)';
      } else {
        out += text.slice(i, j);
      }
      i = j;
    } else {
      out += text[i];
      i++;
    }
  }
  return out;
}

function renderMathInto(el) {
  renderMathInElement(el, {
    delimiters: [
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true }
    ],
    throwOnError: false
  });
}

/* Converts inline slash fractions like "(x-5)/x" or "(x^2-9)/(x-3)" into a
   proper stacked \frac{...}{...}. Skips cases where the "(" belongs to a
   preceding function name (e.g. sin(3x)/x), to avoid mis-rendering those. */
function convertSlashFractions(text) {
  let out = '';
  let i = 0;
  while (i < text.length) {
    if (text[i] === '(' && !/[a-zA-Z]/.test(text[i - 1] || '')) {
      let depth = 1, j = i + 1;
      while (j < text.length && depth > 0) {
        if (text[j] === '(') depth++;
        else if (text[j] === ')') depth--;
        j++;
      }
      const numerator = text.slice(i + 1, j - 1);
      if (text[j] === '/') {
        const k = j + 1;
        let denominator = null;
        let afterDenom = k;
        if (text[k] === '(') {
          let d2 = 1, m = k + 1;
          while (m < text.length && d2 > 0) {
            if (text[m] === '(') d2++;
            else if (text[m] === ')') d2--;
            m++;
          }
          denominator = text.slice(k + 1, m - 1);
          afterDenom = m;
        } else {
          const match = text.slice(k).match(/^[^\s()/?.,;:!]+/);
          if (match) {
            denominator = match[0];
            afterDenom = k + match[0].length;
          }
        }
        if (denominator) {
          out += '\\(\\frac{' + numerator + '}{' + denominator + '}\\)';
          i = afterDenom;
          continue;
        }
      }
      out += text.slice(i, j);
      i = j;
    } else {
      out += text[i];
      i++;
    }
  }
  return out;
}

function convertUnicodeSuperSub(text) {
  const supMap = {'┬▓':'2','┬│':'3','┬╣':'1','тБ░':'0','тБ┤':'4','тБ╡':'5','тБ╢':'6','тБ╖':'7','тБ╕':'8','тБ╣':'9','тБ╗':'-','тБ║':'+'};
  const subMap = {'тВА':'0','тВБ':'1','тВВ':'2','тВГ':'3','тВД':'4','тВЕ':'5','тВЖ':'6','тВЗ':'7','тВИ':'8','тВЙ':'9'};
  return text
    .replace(/[┬▓┬│┬╣тБ░тБ┤тБ╡тБ╢тБ╖тБ╕тБ╣тБ╗тБ║]/g, c => `<sup>${supMap[c]}</sup>`)
    .replace(/[тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ]/g, c => `<sub>${subMap[c]}</sub>`);
}

/* Questions store a mix of plain text and real LaTeX тАФ either wrapped in
   \( \) / \[ \] or as bare commands like \displaystyle\lim_{x \to 1}.
   Math segments must never pass through the plain-text helpers
   (slash fractions, <sup>/<sub> injection) or the LaTeX breaks. */
const MATH_SEGMENT = /(\\\([\s\S]*?\\\)|\\\[[\s\S]*?\\\])/;

/* Wraps bare LaTeX command runs in \( \) so KaTeX picks them up. */
function wrapBareLatex(text) {
  const braceGroup = '\\{(?:[^{}]|\\{[^{}]*\\})*\\}';
  const cmdRun = new RegExp(
    '\\\\[a-zA-Z]+(?:\\s*(?:\\\\[a-zA-Z]+|[_^]\\s*(?:' + braceGroup + '|[A-Za-z0-9+\\-])|' + braceGroup + '))*',
    'g'
  );
  return text.split(MATH_SEGMENT).map((part, k) => {
    if (k % 2 === 1) return part;
    return part.replace(cmdRun, m => '\\(' + m + '\\)');
  }).join('');
}

/* Cleans the inside of one \(...\) / \[...\] segment: removes stray nested
   delimiters (a KaTeX parse error тАФ the red text) and converts unicode
   math symbols to LaTeX equivalents. */
function normalizeLatexSegment(seg) {
  const supMap = {'тБ░':'0','┬╣':'1','┬▓':'2','┬│':'3','тБ┤':'4','тБ╡':'5','тБ╢':'6','тБ╖':'7','тБ╕':'8','тБ╣':'9','тБ║':'+','тБ╗':'-'};
  const subMap = {'тВА':'0','тВБ':'1','тВВ':'2','тВГ':'3','тВД':'4','тВЕ':'5','тВЖ':'6','тВЗ':'7','тВИ':'8','тВЙ':'9'};
  const open = seg.slice(0, 2), close = seg.slice(-2);
  const inner = seg.slice(2, -2)
    .replace(/\\[()[\]]/g, '')
    .replace(/[тБ░┬╣┬▓┬│тБ┤тБ╡тБ╢тБ╖тБ╕тБ╣тБ║тБ╗]+/g, r => '^{' + r.split('').map(c => supMap[c]).join('') + '}')
    .replace(/[тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ]+/g, r => '_{' + r.split('').map(c => subMap[c]).join('') + '}')
    .replace(/[тИТтАУ]/g, '-')
    .replace(/тЖТ/g, '\\to ')
    .replace(/тЙа/g, '\\ne ')
    .replace(/тЙд/g, '\\le ')
    .replace(/тЙе/g, '\\ge ')
    .replace(/тИЮ/g, '\\infty ')
    .replace(/╧А/g, '\\pi ')
    .replace(/[┬╖тЛЕ]/g, '\\cdot ')
    .replace(/├Ч/g, '\\times ');
  return open + inner + close;
}

/* Plain text: slash fractions may create new \( \) segments, so re-split
   before applying the HTML sup/sub conversion. */
function processPlainSegment(seg) {
  return convertSlashFractions(seg).split(MATH_SEGMENT).map((s, k) => {
    if (k % 2 === 1) return escapeHtml(normalizeLatexSegment(s));
    return convertUnicodeSuperSub(escapeHtml(s));
  }).join('');
}

/* The bank sometimes writes a bare "тИЪ(...)" or "тИЪterm" instead of \sqrt{...}
   - a lone тИЪ glyph has no bar drawn over the radicand, so it looks visually
   cut off. Convert to the real LaTeX command; must run before
   convertIntegralNotation, since a тИЪ inside an integrand needs to already
   be \sqrt{...} before the whole integral expression gets wrapped. */
function convertSqrtNotation(text) {
  let out = '';
  let i = 0;
  while (i < text.length) {
    if (text[i] !== 'тИЪ') { out += text[i]; i++; continue; }
    const j = i + 1;
    if (text[j] === '(') {
      let depth = 1, k = j + 1;
      while (k < text.length && depth > 0) {
        if (text[k] === '(') depth++;
        else if (text[k] === ')') depth--;
        k++;
      }
      out += '\\sqrt{' + text.slice(j + 1, k - 1) + '}';
      i = k;
    } else {
      const m = text.slice(j).match(/^[a-zA-Z0-9┬▓┬│┬╣тБ░тБ┤тБ╡тБ╢тБ╖тБ╕тБ╣]+/);
      if (m) { out += '\\sqrt{' + m[0] + '}'; i = j + m[0].length; }
      else { out += text[i]; i++; }
    }
  }
  return out;
}

/* The bank writes definite-integral bounds as Unicode sub/superscripts
   directly after "тИл" (e.g. "тИлтВА┬╣", "тИлтВА╦г", or occasionally already-LaTeX
   "тИл_{тИТ3}^{тИТ1}") instead of real \int_{a}^{b}. Left alone, the bounds
   flatten into inline sub/superscript text next to the sign instead of
   stacking above and below it. Must run after convertSqrtNotation. */
const INT_SUP_MAP = {'тБ░':'0','┬╣':'1','┬▓':'2','┬│':'3','тБ┤':'4','тБ╡':'5','тБ╢':'6','тБ╖':'7','тБ╕':'8','тБ╣':'9','тБ║':'+','тБ╗':'-','╦г':'x','с╡Г':'a','с╡З':'b','с╡Ч':'t','с╢Ь':'c'};
const INT_SUB_MAP = {'тВА':'0','тВБ':'1','тВВ':'2','тВГ':'3','тВД':'4','тВЕ':'5','тВЖ':'6','тВЗ':'7','тВИ':'8','тВЙ':'9','тВЛ':'-','тВР':'a','с╡ж':'b','тВУ':'x','тВЫ':'s'};
const INT_SUP_CHARS = Object.keys(INT_SUP_MAP).join('');
const INT_SUB_CHARS = Object.keys(INT_SUB_MAP).join('');

function convertIntegralNotation(text) {
  let out = '';
  let i = 0;
  while (i < text.length) {
    if (text[i] !== 'тИл') { out += text[i]; i++; continue; }
    let j = i + 1;
    let bounds = '';
    for (let pass = 0; pass < 2; pass++) {
      if (text[j] === '_' || text[j] === '^') {
        if (text[j + 1] === '{') {
          let depth = 1, k = j + 2;
          while (k < text.length && depth > 0) {
            if (text[k] === '{') depth++;
            else if (text[k] === '}') depth--;
            k++;
          }
          bounds += text[j] + text.slice(j + 1, k);
          j = k;
        }
        continue;
      }
      let k = j;
      while (k < text.length && INT_SUB_CHARS.indexOf(text[k]) !== -1) k++;
      if (k > j) {
        bounds += '_{' + text.slice(j, k).split('').map(c => INT_SUB_MAP[c]).join('') + '}';
        j = k;
        continue;
      }
      k = j;
      while (k < text.length && INT_SUP_CHARS.indexOf(text[k]) !== -1) k++;
      if (k > j) {
        bounds += '^{' + text.slice(j, k).split('').map(c => INT_SUP_MAP[c]).join('') + '}';
        j = k;
        continue;
      }
    }
    const rest = text.slice(j);
    const m = rest.match(/^\s*([\s\S]*?)\s*d([xtuyshv]|╬╕)\b/);
    if (!m) { out += text[i]; i++; continue; }
    out += '\\(\\displaystyle\\int' + bounds + '\\,' + m[1] + '\\,d' + m[2] + '\\)';
    i = j + m[0].length;
  }
  return out;
}

function setMathHtml(el, rawText, asParagraphs) {
  let text = convertLimNotation(rawText == null ? '' : String(rawText));
  text = convertSqrtNotation(text);
  text = convertIntegralNotation(text);
  text = wrapBareLatex(text);
  const processed = text.split(MATH_SEGMENT).map((seg, k) => {
    if (k % 2 === 1) return escapeHtml(normalizeLatexSegment(seg));
    return processPlainSegment(seg);
  }).join('');
  const withTables = convertTables(processed);
  const withBreaks = asParagraphs
    ? withTables.split(/\n\s*\n/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('')
    : withTables.replace(/\n/g, '<br>');
  el.innerHTML = prepMath(withBreaks);
  renderMathInto(el);
}

/* тФАтФА STIMULUS GRAPHS тФАтФА
   Many Graph SVGs double as answer explanations (annotations like "тЖТ DNE тЬУ").
   When the question text references its graph, show it while answering with
   those answer-revealing <text> labels stripped; the full annotated version
   still appears with the solution. Neutral labels (e.g. "slope = 3") stay. */
const GRAPH_REF = /graph|figure|table|diagram|curve|plot|shown/i;
const GRAPH_SPOILER = /[тЬУтЬЧтЖТтЗТтЙатЙИ]|\bapparent\b|\bDNE\b|\bnot\b|\bcorrect\b|\bconfirm|\bfalse\b|\btrue\b(?!\s*:)|\bvalid\b|\bwrong\b|\bmin\b|\bmax\b|\bjump\b|\bcusp\b|\bcorner\b|\bhole\b|\bremovable\b|\bLHL\b|\bRHL\b|\blim\s*=|\bexact\b|\bbest\b|\buse|\bavg\b|\bratio\b|both sides|\bset\b|squeeze|horizontal tangent|=[^=,]*=|\([^()]*\)\s*\/\s*\([^()]*\)\s*=/i;

function sanitizeGraph(svg) {
  try {
    const doc = new DOMParser().parseFromString(svg, 'image/svg+xml');
    if (doc.querySelector('parsererror')) return svg;
    doc.querySelectorAll('text').forEach(t => {
      if (GRAPH_SPOILER.test(t.textContent)) t.remove();
    });
    return new XMLSerializer().serializeToString(doc.documentElement);
  } catch (e) { return svg; }
}
function stimulusGraphHtml(q) {
  return (q.Graph && GRAPH_REF.test(q.Question || '')) ? sanitizeGraph(q.Graph) : '';
}

async function loadSet() {
  let url = `${API_BASE}/AdvancedCusQuestions?chap=${encodeURIComponent(chapter)}&n=${encodeURIComponent(count)}`;
  if (grade) url += `&grad=${encodeURIComponent(grade)}`;
  if (type)  url += `&type=${encodeURIComponent(type)}`;
  if (topic) url += `&topic=${encodeURIComponent(topic)}`;

  try {
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.status === 401) { window.location.href = 'LOGIN'; return; }
    if (!res.ok) {
      setMathHtml(questionPrompt, 'Could not load your custom set. Try adjusting your filters.', false);
      return;
    }
    questionSet = await res.json();
    if (!questionSet.length) {
      showEmptyState();
      return;
    }
    if (questionSet.length < count) {
      shortfallText.textContent = `Only ${questionSet.length} of the ${count} questions you asked for matched your filters. Try widening topic, difficulty, or calculator settings for a bigger set next time.`;
      shortfallNotice.classList.add('visible');
    }
    buildNavigator();
    goToQuestion(0);
  } catch (err) {
    setMathHtml(questionPrompt, 'Could not reach the server. Is the backend running?', false);
  }
}

function showEmptyState() {
  examMain.style.display = 'none';
  examBottom.style.display = 'none';
  centerScreen.style.display = 'flex';
  centerCard.innerHTML = `
    <h2>No questions matched your filters</h2>
    <p>Try widening your topic, difficulty, or calculator settings.</p>
    <div class="center-card-actions">
      <a class="btn-primary" href="AdvancedCustomizationPage">Adjust filters</a>
    </div>`;
}

/* Jumps to any question тАФ already answered (shown read-only, locked) or not
   yet reached (shown fresh). The set can be worked in any order. */
function goToQuestion(idx) {
  if (idx < 0 || idx >= questionSet.length) return;
  currentIndex = idx;
  selectedChoice = null;
  currentQuestion = questionSet[idx];

  setProgressFill.style.width = (Object.keys(answers).length / questionSet.length * 100) + '%';
  qNumBadge.textContent = idx + 1;
  questionTag.textContent = topic || chapter;

  resetReportPanel();
  renderQuestion(currentQuestion);
  refreshNavigator();
}

/* Sets the bottom action button for an already-answered question: the final
   slide always offers to see results (like "Submit Quiz" on the last question
   in the timed quiz), regardless of whether earlier questions were skipped. */
function setContinueButtonState() {
  const isLast = currentIndex === questionSet.length - 1;
  actionBtn.textContent = isLast ? 'See Results' : 'Next Question';
  actionBtn.disabled = false;
}

/* тФАтФАтФА QUESTION NAV POPUP тФАтФАтФА */
function buildNavigator() {
  const popup = document.getElementById('qNavPopup');
  popup.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'q-nav-popup-grid';
  popup.appendChild(grid);
  questionSet.forEach((q, idx) => {
    const btn = document.createElement('button');
    btn.className = 'q-grid-btn';
    btn.textContent = idx + 1;
    btn.id = `navdot-${idx}`;
    btn.addEventListener('click', () => {
      goToQuestion(idx);
      popup.classList.remove('open');
    });
    grid.appendChild(btn);
  });
  refreshNavigator();
}
function refreshNavigator() {
  const total = questionSet.length;
  const qNavBtn = document.getElementById('qNavBtn');
  if (qNavBtn) qNavBtn.textContent = `Question ${currentIndex + 1} of ${total} тЖС`;
  questionSet.forEach((q, idx) => {
    const btn = document.getElementById(`navdot-${idx}`);
    if (!btn) return;
    btn.classList.toggle('answered', q.ID in answers);
    btn.classList.toggle('current', idx === currentIndex);
  });
}

document.getElementById('qNavBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('qNavPopup').classList.toggle('open');
});
document.addEventListener('click', (e) => {
  const popup = document.getElementById('qNavPopup');
  if (!popup.contains(e.target) && e.target !== document.getElementById('qNavBtn')) {
    popup.classList.remove('open');
  }
});

function renderQuestion(q) {
  setMathHtml(questionPrompt, q.Question, false);
  const stimulusEl = document.getElementById('stimulusGraph');
  const stimulus = stimulusGraphHtml(q);
  stimulusEl.innerHTML = stimulus;
  stimulusEl.style.display = stimulus ? 'block' : 'none';
  choicesList.innerHTML = '';
  ['option1', 'option2', 'option3', 'option4'].forEach((key, idx) => {
    const letter = ['A', 'B', 'C', 'D'][idx];
    const row = document.createElement('div');
    row.className = 'choice-row';
    row.dataset.value = q[key];
    row.innerHTML = `<span class="choice-badge">${letter}</span><span class="choice-text"></span>`;
    row.addEventListener('click', () => selectChoice(row));
    choicesList.appendChild(row);
    setMathHtml(row.querySelector('.choice-text'), q[key], false);
  });

  const prior = answers[q.ID];
  const graphEl = document.getElementById('questionGraph');
  if (prior) {
    document.querySelectorAll('.choice-row').forEach(row => {
      row.classList.add('locked');
      if (row.dataset.value === prior.correctAnswer) {
        row.classList.add('correct');
      } else if (row.dataset.value === prior.selectedChoice) {
        row.classList.add('incorrect');
      }
      if (row.dataset.value === prior.selectedChoice) row.classList.add('selected');
    });
    solutionResult.textContent = prior.correct ? 'Correct' : 'Not quite';
    solutionResult.className = 'solution-result ' + (prior.correct ? 'is-correct' : 'is-incorrect');
    setMathHtml(solutionText, prior.solution || 'No solution available for this question.', true);
    if (q.Graph) {
      graphEl.innerHTML = q.Graph;
      graphEl.style.display = 'block';
    } else {
      graphEl.style.display = 'none';
    }
    solutionPanel.style.display = 'block';
    scrollHint.style.display = 'block';
    setContinueButtonState();
  } else {
    solutionPanel.style.display = 'none';
    scrollHint.style.display = 'none';
    graphEl.innerHTML = '';
    graphEl.style.display = 'none';
    actionBtn.textContent = 'Submit';
    actionBtn.disabled = true;
  }
}

function selectChoice(row) {
  if (answers[currentQuestion.ID]) return;
  document.querySelectorAll('.choice-row').forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');
  selectedChoice = row.dataset.value;
  actionBtn.disabled = false;
}

function showSummary() {
  setProgressFill.style.width = '100%';
  examMain.style.display = 'none';
  examBottom.style.display = 'none';
  centerScreen.style.display = 'flex';
  const total = questionSet.length;
  const correctCount = Object.values(answers).filter(a => a.correct).length;
  const pct = Math.round((correctCount / total) * 100);
  centerCard.innerHTML = `
    <div class="big-score">${correctCount}/${total}</div>
    <h2>${pct}% correct</h2>
    <p>That's your custom set on ${escapeHtml(chapter)}${topic ? ' ┬╖ ' + escapeHtml(topic) : ''}. Build another set to keep practicing.</p>
    <div class="center-card-actions">
      <a class="btn-secondary" href="homepage">Back to home</a>
      <a class="btn-primary" href="AdvancedCustomizationPage">Build another set</a>
    </div>`;
}

actionBtn.addEventListener('click', async () => {
  const prior = answers[currentQuestion.ID];
  if (!prior) {
    if (!selectedChoice || !currentQuestion) return;
    actionBtn.disabled = true;
    try {
      const res = await fetch(`${API_BASE}/answerQuestion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ ID: currentQuestion.ID, Answer: selectedChoice })
      });
      if (res.status === 401) { window.location.href = 'LOGIN'; return; }
      const result = await res.json();
      answers[currentQuestion.ID] = {
        selectedChoice,
        correct: !!result.Correct,
        correctAnswer: result.CorrectAnswer,
        solution: result.Solution
      };
      renderQuestion(currentQuestion);
      setProgressFill.style.width = (Object.keys(answers).length / questionSet.length * 100) + '%';
      refreshNavigator();
    } catch (err) {
      actionBtn.disabled = false;
    }
  } else if (currentIndex === questionSet.length - 1) {
    showSummary();
  } else {
    goToQuestion(currentIndex + 1);
  }
});

/* тФАтФАтФА REPORT A PROBLEM тФАтФАтФА */
const reportTrigger = document.getElementById('reportTrigger');
const reportPanel   = document.getElementById('reportPanel');

function resetReportPanel() {
  reportPanel.innerHTML = `
    <div class="report-panel-title">What's wrong with this question?</div>
    <div class="report-options">
      <label><input type="radio" name="reportReason" value="Question is wrong"> The question itself is wrong</label>
      <label><input type="radio" name="reportReason" value="All the options are wrong"> All the options are wrong</label>
      <label><input type="radio" name="reportReason" value="Question leaks the answer"> The question leaks the answer</label>
      <label><input type="radio" name="reportReason" value="Other"> Other</label>
    </div>
    <textarea class="report-textarea" id="reportDetails" placeholder="Describe the issueтАж"></textarea>
    <div class="report-actions">
      <button class="report-btn cancel" id="reportCancelBtn" type="button">Cancel</button>
      <button class="report-btn send" id="reportSendBtn" type="button" disabled>Send Report</button>
    </div>
  `;
  reportPanel.style.display = 'none';
  reportTrigger.style.display = 'inline-flex';
  bindReportPanelEvents();
}

function bindReportPanelEvents() {
  const details = document.getElementById('reportDetails');
  const sendBtn = document.getElementById('reportSendBtn');
  const cancelBtn = document.getElementById('reportCancelBtn');

  document.querySelectorAll('input[name="reportReason"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const isOther = radio.value === 'Other' && radio.checked;
      details.style.display = isOther ? 'block' : 'none';
      sendBtn.disabled = isOther ? !details.value.trim() : false;
    });
  });
  details.addEventListener('input', () => {
    const selected = document.querySelector('input[name="reportReason"]:checked');
    if (selected && selected.value === 'Other') sendBtn.disabled = !details.value.trim();
  });
  cancelBtn.addEventListener('click', () => {
    reportPanel.style.display = 'none';
    reportTrigger.style.display = 'inline-flex';
  });
  sendBtn.addEventListener('click', async () => {
    const selected = document.querySelector('input[name="reportReason"]:checked');
    if (!selected || !currentQuestion) return;
    sendBtn.disabled = true;
    sendBtn.textContent = 'SendingтАж';
    try {
      const res = await fetch(`${API_BASE}/ReportQuestion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          QuestionID: currentQuestion.ID,
          Chapter: currentQuestion.Chapter,
          Reason: selected.value,
          Details: details.value.trim()
        })
      });
      if (res.status === 401) { window.location.href = 'LOGIN'; return; }
      if (!res.ok) throw new Error('failed');
      reportPanel.innerHTML = '<div class="report-confirm">Thanks тАФ your report has been sent.</div>';
    } catch (err) {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send Report';
      alert('Could not send the report. Please try again.');
    }
  });
}

reportTrigger.addEventListener('click', () => {
  reportTrigger.style.display = 'none';
  reportPanel.style.display = 'block';
});
resetReportPanel();

loadSet();
</script>
