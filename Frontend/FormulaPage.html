<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulas — UkusAP</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
<style>
:root {
  --bg: #F4F5F7;
  --bg2: #FFFFFF;
  --bg3: #FAFBFC;
  --gold: #F0A012;
  --gold2: #D88A0A;
  --teal: #00A187;
  --text: #15171F;
  --muted: #6B7280;
  --muted2: #9CA3AF;
  --border: rgba(15,23,42,0.08);
  --card: #FFFFFF;
  --sidebar-w: 264px;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  line-height: 1.6;
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 1.6rem 1.2rem;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  margin-bottom: 1.8rem;
  padding: 0 0.4rem;
}
.sidebar-logo .logo-int { color: var(--gold); }

.sidebar-user {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.6rem 0.4rem 1.4rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.2rem;
}

.user-avi {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), #FF6B35);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 0.95rem;
  flex-shrink: 0;
}

.user-info { flex: 1; overflow: hidden; }
.user-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; font-size: 0.92rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-plan { font-size: 0.74rem; color: var(--muted2); }

.logout-btn {
  background: none; border: none;
  color: var(--muted2); cursor: pointer;
  padding: 0.3rem; display: flex;
  border-radius: 6px; transition: all 0.18s; flex-shrink: 0;
}
.logout-btn:hover { color: var(--text); background: var(--bg); }

.nav-list {
  list-style: none;
  display: flex; flex-direction: column; gap: 0.25rem;
}

.nav-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.65rem 0.8rem;
  border-radius: 10px;
  color: var(--muted);
  text-decoration: none;
  font-size: 0.88rem; font-weight: 500;
  transition: all 0.18s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active {
  background: rgba(240,160,18,0.08);
  color: var(--gold2);
  font-weight: 600;
  border-left-color: var(--gold);
}
.nav-item svg { flex-shrink: 0; width: 18px; height: 18px; }
.nav-formula-icon {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem; font-weight: 700;
  text-align: center;
  flex-shrink: 0; line-height: 1;
}

.sidebar-topbar { display: flex; align-items: center; justify-content: space-between; }
.mobile-menu-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  flex-shrink: 0;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
}
.mobile-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.4);
  z-index: 150;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  body { flex-direction: column; }
  .sidebar {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: auto;
    width: 100%;
    flex-direction: column;
    align-items: stretch;
    height: auto;
    max-height: 100vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 12px 1.2rem;
    overflow: hidden;
    z-index: 200;
  }
  .sidebar.mobile-open { overflow-y: auto; }
  .sidebar-logo { margin-bottom: 0; }
  .sidebar-topbar { min-height: 38px; }
  .mobile-menu-btn { display: flex; }
  .sidebar-user, .nav-list { display: none; }
  .sidebar.mobile-open .sidebar-user {
    display: flex;
    padding: 1rem 0 1.2rem;
    margin-bottom: 0;
  }
  .sidebar.mobile-open .nav-list {
    display: flex;
    flex-direction: column;
    padding-bottom: 0.6rem;
  }
  .nav-item { white-space: normal; }
  .sidebar.mobile-open + .mobile-backdrop { display: block; }
  .main { margin-left: 0; margin-top: 65px; padding: 1.6rem 1.2rem 3rem; }
}

/* ── Main ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 2.4rem 3rem 4rem;
  max-width: 940px;
}

/* ── Page header ── */
.main-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 1.6rem;
}
.header-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--teal); display: block; margin-bottom: 0.4rem;
}
.header-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em;
}
.header-sub {
  font-size: 0.87rem; color: var(--muted); margin-top: 0.3rem;
}

/* ── Chapter tabs ── */
.chapter-tabs {
  display: flex; gap: 0.45rem;
  margin-bottom: 1.8rem;
  flex-wrap: wrap;
}

.ctab {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.85rem; font-weight: 600;
  padding: 0.48rem 1.15rem;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
  display: flex; align-items: center; gap: 0.4rem;
}
.ctab:hover { border-color: rgba(15,23,42,0.2); color: var(--text); }
.ctab.active { background: var(--gold); border-color: var(--gold); color: #fff; }

.soon-badge {
  font-size: 0.62rem;
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: var(--muted2);
  border: 1px solid var(--border);
  padding: 0.05rem 0.4rem;
  border-radius: 100px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.ctab.active .soon-badge { background: rgba(255,255,255,0.25); color: #fff; border-color: transparent; }

/* ── Formula groups ── */
.fgroup {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  margin-bottom: 1.2rem;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(15,23,42,0.04);
}

.fgroup-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.9rem 1.4rem;
  border-bottom: 1px solid var(--border);
}
.fgroup-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.fgroup-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 0.93rem;
  flex: 1;
}
.fgroup-count {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem; color: var(--muted2);
  background: var(--bg3);
  padding: 0.18rem 0.55rem;
  border-radius: 100px;
}

/* ── Formula entries ── */
.fentry {
  display: flex; align-items: flex-start; gap: 1rem;
  padding: 0.9rem 1.4rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.fentry:last-child { border-bottom: none; }
.fentry:hover { background: var(--bg3); }

.fnum {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; font-weight: 700;
  flex-shrink: 0;
  margin-top: 0.6rem;
}

.fmath-wrap { flex: 1; min-width: 0; }

.fmath { font-size: 1rem; }
.fmath .katex-display { margin: 0.3rem 0 0.1rem; text-align: left; }

.fdesc {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-top: 0.2rem;
}

/* ── Series/Sequence test cards ── */
.stest-entry {
  padding: 1rem 1.4rem 1.1rem;
  border-bottom: 1px solid var(--border);
}
.stest-entry:last-child { border-bottom: none; }
.stest-entry:hover { background: var(--bg3); }

.stest-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 0.92rem;
  margin-bottom: 0.6rem;
  display: block;
}

.stest-grid {
  display: grid;
  grid-template-columns: 110px 1fr;
  row-gap: 0.4rem;
  column-gap: 0.9rem;
  margin-bottom: 0.55rem;
}
.stest-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted2);
  padding-top: 0.15rem;
}
.stest-math { font-size: 0.95rem; }
.stest-math .katex-display { margin: 0.2rem 0; text-align: left; }

.stest-comment {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.55;
  padding-top: 0.3rem;
  border-top: 1px dashed var(--border);
}

/* ── Coming soon ── */
.coming-soon {
  display: flex; flex-direction: column;
  align-items: center; gap: 0.75rem;
  padding: 3.5rem 1rem;
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 1px 4px rgba(15,23,42,0.04);
}
.coming-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: rgba(240,160,18,0.1);
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
}
.coming-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 1.1rem;
}
.coming-sub {
  font-size: 0.86rem; color: var(--muted);
  max-width: 320px; line-height: 1.65;
}

/* ── Animations ── */
.fade-up {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.5s ease forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: none; } }
.fade-up:nth-child(2) { animation-delay: 0.06s; }
.fade-up:nth-child(3) { animation-delay: 0.12s; }
</style>
</head>

<!-- ───────────── MAIN ───────────── -->
<main class="main">

  <div class="main-header fade-up">

      <span class="header-eyebrow">Reference Sheet</span>

<!-- ───────────── SCRIPTS ───────────── -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js"></script>
<script src="config.js"></script>
<script>
const token = localStorage.getItem('derive_token');
if (!token) { window.location.href = 'LOGIN.html'; }

const storedName = localStorage.getItem('derive_name');
if (storedName) {
  document.getElementById('userName').textContent = storedName;
  document.getElementById('userAvi').textContent = storedName.charAt(0).toUpperCase();
}

// ── Formula data ──────────────────────────────────────────────────────────────
const GROUPS = [
  {
    name: 'Limit Laws',
    color: '#00A187',
    bg: 'rgba(0,161,135,0.1)',
    entries: [
      {
        num: 'I',
        desc: 'Sum & Difference Rule',
        tex: '\\lim_{x\\to a}\\,[f(x) \\pm g(x)] = \\lim_{x\\to a}f(x) \\pm \\lim_{x\\to a}g(x)'
      },
      {
        num: 'II',
        desc: 'Constant Multiple Rule',
        tex: '\\lim_{x\\to a}P \\cdot f(x) = P \\cdot \\lim_{x\\to a}f(x), \\quad P = \\text{Constant}'
      },
      {
        num: 'III',
        desc: 'Product Rule',
        tex: '\\lim_{x\\to a}[f(x) \\cdot g(x)] = \\lim_{x\\to a}f(x) \\cdot \\lim_{x\\to a}g(x)'
      },
      {
        num: 'IV',
        desc: 'Quotient Rule',
        tex: '\\lim_{x\\to a}\\frac{f(x)}{g(x)} = \\dfrac{\\displaystyle\\lim_{x\\to a}f(x)}{\\displaystyle\\lim_{x\\to a}g(x)}'
      }
    ]
  },
  {
    name: 'Trigonometric Standard Limits',
    color: '#F0A012',
    bg: 'rgba(240,160,18,0.1)',
    entries: [
      {
        num: 'V',
        desc: 'Continuity of sin',
        tex: '\\lim_{x\\to a}\\sin x = \\sin\\!\\left[\\lim_{x\\to a}x\\right] = \\sin a'
      },
      {
        num: 'VI',
        desc: 'Power–Difference Limit',
        tex: '\\lim_{x\\to a}\\frac{x^n - a^n}{x - a} = n\\,a^{n-1}'
      },
      {
        num: 'VII',
        desc: 'Tangent Sinc Limits',
        tex: '\\lim_{x\\to 0}\\frac{\\tan x}{x} = \\lim_{x\\to 0}\\frac{x}{\\tan x} = 1'
      },
      {
        num: 'VIII',
        desc: 'Sine Sinc Limits',
        tex: '\\lim_{x\\to 0}\\frac{\\sin x}{x} = 1 = \\lim_{x\\to 0}\\frac{x}{\\sin x}'
      },
      {
        num: 'XI',
        desc: 'Cosine at Zero',
        tex: '\\lim_{x\\to 0}\\cos x = 1'
      },
      {
        num: 'XII',
        desc: 'Shifted Sinc Limit',
        tex: '\\lim_{x\\to a}\\frac{\\sin(x - a)}{(x - a)} = 1'
      }
    ]
  },
  {
    name: 'Inverse Trigonometric Limits',
    color: '#7C3AED',
    bg: 'rgba(124,58,237,0.1)',
    entries: [
      {
        num: 'IX',
        desc: 'Inverse-sine Sinc',
        tex: '\\lim_{x\\to 0}\\frac{\\sin^{-1} x}{x} = 1 = \\lim_{x\\to 0}\\frac{x}{\\sin^{-1} x}'
      },
      {
        num: 'X',
        desc: 'Inverse-tangent Sinc',
        tex: '\\lim_{x\\to 0}\\frac{\\tan^{-1} x}{x} = 1 = \\lim_{x\\to 0}\\frac{x}{\\tan^{-1} x}'
      },
      {
        num: 'XIII',
        desc: 'Continuity of sin⁻¹',
        tex: '\\lim_{x\\to a}\\sin^{-1} x = \\sin^{-1} a, \\quad |a| \\leq 1'
      },
      {
        num: 'XIV',
        desc: 'Continuity of cos⁻¹',
        tex: '\\lim_{x\\to a}\\cos^{-1} x = \\cos^{-1} a, \\quad |a| \\leq 1'
      },
      {
        num: 'XV',
        desc: 'Continuity of tan⁻¹',
        tex: '\\lim_{x\\to a}\\tan^{-1} x = \\tan^{-1} a, \\quad a \\in \\mathbb{R}'
      }
    ]
  },
  {
    name: 'Exponential & Logarithmic Limits',
    color: '#2563EB',
    bg: 'rgba(37,99,235,0.1)',
    entries: [
      {
        num: 'XVI',
        desc: 'Binomial Limit',
        tex: '\\lim_{x\\to 0}\\frac{(1+x)^n - 1}{x} = n'
      },
      {
        num: 'XVII',
        desc: 'Natural Log Limit',
        tex: '\\lim_{x\\to 0}\\frac{1}{x}\\log(1+x) = 1'
      },
      {
        num: 'XVIII',
        desc: 'Exponential Limit',
        tex: '\\lim_{x\\to 0}\\frac{a^x - 1}{x} = \\log_e a'
      }
    ]
  }
];

// ── Differentiation formula data ──────────────────────────────────────────────
const DIFF_GROUPS = [
  {
    name: 'Fundamental Rules',
    color: '#00A187',
    bg: 'rgba(0,161,135,0.1)',
    entries: [
      { num: '1', desc: 'Constant & Constant Multiple',
        tex: '\\frac{d}{dx}(c) = 0 \\quad\\Big|\\quad \\frac{d}{dx}(cu) = C\\,\\frac{du}{dx}' },
      { num: '2', desc: 'Linear Rule',
        tex: '\\frac{d}{dx}(mx + b) = m' },
      { num: '3', desc: 'Power Rule',
        tex: '\\frac{d}{dx}(x^n) = nx^{n-1}' },
      { num: '4', desc: 'Coefficient Power Rule',
        tex: '\\frac{d}{dx}(kx^n) = nkx^{n-1}' }
    ]
  },
  {
    name: 'Combination Rules',
    color: '#F0A012',
    bg: 'rgba(240,160,18,0.1)',
    entries: [
      { num: '5', desc: 'Sum & Difference Rule',

// ── Build Limits & Continuity HTML ────────────────────────────────────────────
function buildLimitsHtml() {
  return GROUPS.map(g => {
    const rows = g.entries.map(e => `
      <div class="fentry">
        <span class="fnum" style="background:${g.bg};color:${g.color}">${e.num}</span>
        <div class="fmath-wrap">
          <div class="fmath">\\[${e.tex}\\]</div>
          <div class="fdesc">${e.desc}</div>
        </div>
      </div>`).join('');

    return `
      <div class="fgroup">
        <div class="fgroup-header">
          <span class="fgroup-dot" style="background:${g.color}"></span>
          <span class="fgroup-name">${g.name}</span>
          <span class="fgroup-count">${g.entries.length} formula${g.entries.length > 1 ? 's' : ''}</span>
        </div>
        <div class="fgroup-body">${rows}</div>
      </div>`;
  }).join('');
}

// ── Build coming-soon HTML ────────────────────────────────────────────────────
function buildComingSoon(chapterName) {
  return `
    <div class="coming-soon">
      <div class="coming-icon">
        <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 8v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="coming-title">${chapterName} Formulas</div>
      <div class="coming-sub">Formula sheets for this chapter are being prepared. Check back soon — they'll appear here when ready.</div>
    </div>`;
}

// ── Render content & run KaTeX ────────────────────────────────────────────────
function renderContent(ch) {
  const el = document.getElementById('formulaContent');

  if (ch === 'limits') {
    el.innerHTML = buildLimitsHtml();
  } else if (ch === 'diff') {
    el.innerHTML = buildDiffHtml();
  } else if (ch === 'int') {
    el.innerHTML = buildIntHtml();
  } else if (ch === 'series') {
    el.innerHTML = buildSeriesHtml();
  }

  renderMathInElement(el, {
    delimiters: [
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false }
    ],
    throwOnError: false
  });
}

// ── Chapter tab switching ─────────────────────────────────────────────────────
document.getElementById('chapterTabs').addEventListener('click', e => {
  const btn = e.target.closest('.ctab');
  if (!btn) return;
  document.querySelectorAll('.ctab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent(btn.dataset.ch);
});

// ── Logout ────────────────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileBackdrop = document.getElementById('mobileBackdrop');

function closeMobileMenu() {
  sidebar.classList.remove('mobile-open');
  mobileMenuBtn.setAttribute('aria-expanded', 'false');
}
mobileMenuBtn.addEventListener('click', () => {
  const open = sidebar.classList.toggle('mobile-open');
  mobileMenuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
});
mobileBackdrop.addEventListener('click', closeMobileMenu);
window.addEventListener('resize', () => { if (window.innerWidth > 900) closeMobileMenu(); });

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    if (token) {
      await fetch(`${API_BASE}/logout`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    }
  } catch (_) {}
  localStorage.removeItem('derive_token');
  localStorage.removeItem('derive_name');
  window.location.href = 'LOGIN.html';
});

// ── Initial render ────────────────────────────────────────────────────────────
renderContent('limits');
